[build-system]
requires = ["scikit-build-core>=0.9", "pybind11>=2.12"]
build-backend = "scikit_build_core.build"

[project]
name = "midigpt"
version = "0.1.0"
description = "MIDI music generation — C++/Python hybrid (GPT-2 Transformer)"
requires-python = ">=3.10"
# torch is required for inference (sample_multi_step / get_notes).
# Dataset creation and encoding work without it (build with MIDIGPT_NO_TORCH=ON).
dependencies = [
    "torch>=2.5.1",
]

[project.optional-dependencies]
train = [
    "transformers>=4.40.0",
    "numpy>=1.26",
    "tqdm>=4.66",
    "tensorboard>=2.15",
    "scipy>=1.11",
    "matplotlib>=3.8",
    "pretty_midi>=0.2.10",
    "attrs>=23.1",
    "jsonlines>=3.1",
]
dataset = [
    "attrs>=23.1",
    "jsonlines>=3.1",
    "numpy>=1.26",
    "tqdm>=4.66",
    "pretty_midi>=0.2.10",
]

[tool.scikit-build]
cmake.build-type = "Release"
# src/python/midigpt/__init__.py re-exports the C++ extension (_midigpt.so).
# The extension itself is installed into the midigpt/ package directory via
# `install(TARGETS _midigpt DESTINATION midigpt)` in CMakeLists.txt.
wheel.packages = ["src/python/midigpt"]

# System libraries required before `pip install`:
#   macOS:  brew install cmake abseil protobuf
#   Debian: apt install cmake libprotobuf-dev protobuf-compiler libabsl-dev
#   HPC:    module load cmake protobuf abseil (cuda optional for inference)
