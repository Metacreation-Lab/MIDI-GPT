[build-system]
requires = [
    "setuptools>=64.0",
    "wheel",
    "pybind11[global]>=2.12.0",
    "cmake>=3.16",
    "ninja",
    "torch>=2.0.0",
    "numpy>=1.21.0,<2.0",
]
build-backend = "setuptools.build_meta"

[project]
name = "midigpt"
version = "0.1.0"
description = "MIDI-GPT: A machine learning library for MIDI generation and processing"
readme = "README.md"
authors = [
    {name = "Jeff Ens", email = "jeff.ens@example.com"},
    {name = "Rafael Arias", email = "raa60@sfu.ca"},
]
requires-python = ">=3.9"
classifiers = [
    "Development Status :: 3 - Alpha",
    "Intended Audience :: Developers",
    "Intended Audience :: Science/Research",
    "License :: OSI Approved :: MIT License",
    "Programming Language :: Python :: 3",
    "Programming Language :: Python :: 3.9",
    "Programming Language :: Python :: 3.10",
    "Programming Language :: Python :: 3.11",
    "Programming Language :: Python :: 3.12",
    "Programming Language :: C++",
    "Topic :: Multimedia :: Sound/Audio :: MIDI",
    "Topic :: Scientific/Engineering :: Artificial Intelligence",
]

dependencies = [
    "torch>=2.0.0",
    "numpy>=1.21.0,<2.0",  # Temporary constraint for compatibility
    "protobuf>=4.0.0",
    "transformers>=4.30.0",
    "tqdm",
    "pybind11>=2.12.0",
]

[project.optional-dependencies]
dev = [
    "pytest>=6.0",
    "pytest-cov",
    "black",
    "isort",
    "mypy",
]
cuda = [
    "torch[cuda]>=2.0.0",
]
cpu = [
    "torch[cpu]>=2.0.0", 
]

[project.urls]
Homepage = "https://github.com/Metacreation-Lab/MIDI-GPT"
Repository = "https://github.com/Metacreation-Lab/MIDI-GPT"
Issues = "https://github.com/Metacreation-Lab/MIDI-GPT/issues"

[tool.setuptools]
packages = ["midigpt"]

[tool.setuptools.package-dir]
midigpt = "python_lib"

[tool.black]
line-length = 88
target-version = ['py39']

[tool.isort]
profile = "black"

[tool.mypy]
python_version = "3.9"
strict = true