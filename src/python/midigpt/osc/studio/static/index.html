<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MIDI-GPT Studio</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/static/css/style.css">

  <!-- socket.io client (served by flask-socketio) -->
  <script src="/socket.io/socket.io.js"></script>

  <!-- Spessasynth — SF2 synthesizer -->
  <script src="https://cdn.jsdelivr.net/npm/spessasynth_lib@3/src/synthetizer/synthetizer.min.js"></script>

  <!-- @tonejs/midi for MIDI file parsing -->
  <script src="https://cdn.jsdelivr.net/npm/@tonejs/midi@2/build/Midi.js"></script>
</head>
<body>

  <!-- ── Top bar ──────────────────────────────────────────────────────── -->
  <header id="topbar">
    <div class="topbar-left">
      <span class="logo">MIDI-GPT <span class="logo-accent">Studio</span></span>
    </div>
    <div id="transport" class="topbar-center"></div>
    <div class="topbar-right">
      <!-- placeholder for future controls -->
    </div>
  </header>

  <!-- ── Main 3-panel layout ──────────────────────────────────────────── -->
  <div id="main-layout">

    <!-- Left: Track list -->
    <aside id="trackList"></aside>

    <!-- Centre: Piano roll -->
    <div id="pianoRollWrap">
      <div id="pianoRoll"></div>
    </div>

    <!-- Right: Attribute graph -->
    <div id="attrGraphWrap">
      <div class="panel-label">Attributes — realized vs. requested</div>
      <div id="attrGraph"></div>
    </div>

  </div>

  <!-- ── Bottom: Parameter panel ──────────────────────────────────────── -->
  <footer id="paramPanel"></footer>

  <script type="module" src="/static/js/main.js"></script>
</body>
</html>
